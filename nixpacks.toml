# Railway deployment config (nixpacks)
# PHP auto-detected from composer.json (^8.4)
# Gunakan aptPkgs (Ubuntu/Debian) bukan nixPkgs karena runtime Railway adalah Ubuntu

[phases.setup]
aptPkgs = [
  "nodejs",
  "npm",
  "chromium",
  "libgconf-2-4",
  "libnss3",
  "libxss1",
  "libatk-bridge2.0-0",
  "libgtk-3-0",
  "ca-certificates",
  "fonts-liberation",
  "libappindicator3-1",
  "libasound2",
  "libnspr4",
  "libxrandr2",
  "xdg-utils"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction"
]

[start]
cmd = "rm -f bootstrap/cache/config.php bootstrap/cache/routes.php bootstrap/cache/services.php || true && php artisan storage:link --force || true && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
