# Railway deployment config (nixpacks)
# PHP auto-detected from composer.json (^8.4)
# nodejs & chromium dibutuhkan untuk fitur Unduh JPG via Browsershot

[phases.setup]
nixPkgs = ["nodejs_20", "chromium"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "ln -sf $(which node) /usr/local/bin/node || true",
  "ln -sf $(which npm) /usr/local/bin/npm || true",
  "ln -sf $(which chromium) /usr/local/bin/chromium || true"
]

[start]
cmd = "rm -f bootstrap/cache/config.php bootstrap/cache/routes.php bootstrap/cache/services.php || true && php artisan storage:link --force || true && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
