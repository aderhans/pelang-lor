# Railway deployment config (nixpacks)
# PHP auto-detected from composer.json (^8.4)
# Set NIXPACKS_PHP_EXTENSIONS=gd,bcmath,mbstring,pdo_mysql,xml,fileinfo,zip di Railway Variables

[phases.setup]
nixPkgs = ["nodejs_20", "chromium"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  # Symlink agar node/npm/chromium bisa ditemukan PHP via shell_exec saat runtime
  "ln -sf $(which node) /usr/local/bin/node || true",
  "ln -sf $(which npm) /usr/local/bin/npm || true",
  "ln -sf $(which chromium) /usr/local/bin/chromium || true",
  "php artisan storage:link || true",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
# Seeder hanya dijalankan sekali (manual via Railway Console)
# php artisan db:seed --class=AdminSeeder --force
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
